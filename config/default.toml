[server]
host = "127.0.0.1"
port = 8787

[storage]
database_path = ".ldc/linkedin-dev-companion.db"

[content]
auto_publish = false
character_limit = 3000
draft_model = "local-template-v2"

[llm]
provider = "template"
openai_api_key_env = "OPENAI_API_KEY"
reasoning_effort = "medium"

[copilot]
enabled = false
cli_path = "copilot"
model = "copilot-latest"
github_token_env = "COPILOT_GITHUB_TOKEN"
